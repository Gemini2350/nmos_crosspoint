# Deploy-Variante: kein Source-Code nötig, zieht das fertige Image von Docker
# Hub und startet es. Auf einem neuen Host:
#
#   1) Diese Datei (docker-compose.deploy.yml) in ein leeres Verzeichnis legen
#   2) Persistente Ordner anlegen:
#        mkdir -p server/config server/state
#   3) Hochfahren:
#        docker compose -f docker-compose.deploy.yml up -d
#   4) Update auf neueste Version:
#        docker compose -f docker-compose.deploy.yml pull
#        docker compose -f docker-compose.deploy.yml up -d
#
# Default-Login ist admin / admin (siehe README). Beim ersten Start
# wechseln im Setup → "Change Login & Password".

services:
  nmos-crosspoint:
    image: gemini2350/nmos-crosspoint_v3:latest

    container_name: nmos-crosspoint_v3
    hostname: nmos-crosspoint_v3
    domainname: local

    network_mode: host

    volumes:
      - ./server/config:/nmos-crosspoint/server/config
      - ./server/state:/nmos-crosspoint/server/state

    restart: unless-stopped
